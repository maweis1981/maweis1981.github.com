name: "WeChat Publish"

on:
  workflow_dispatch:
    inputs:
      post:
        description: "Path to the markdown post (e.g. _posts/2026-06-14-ai-daily-2026-06-14.md)"
        required: true
        type: string
      cover:
        description: "Cover image: local path (jpg/png in repo) or https:// URL. Falls back to post image.path then DEFAULT_COVER."
        required: false
        type: string
      publish:
        description: "Submit to freepublish after creating the draft"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Render HTML only, no API calls (for testing the converter)"
        required: false
        type: boolean
        default: false

  # Also triggerable from the GitHub API via `POST /repos/.../dispatches`,
  # which only needs Contents:Write (a permission the Claude Code App
  # already has, unlike Actions:Write which gates workflow_dispatch).
  # client_payload mirrors the workflow_dispatch.inputs shape.
  repository_dispatch:
    types: [wechat-publish]

  # Auto-trigger: when a new or updated AI Daily post lands on master,
  # publish it as a draft to 公众号 (publish: false — review in 草稿箱
  # before sending). Cover is read from the post's image.path front
  # matter (supports https:// URLs), falling back to DEFAULT_COVER.
  push:
    branches: [master]
    paths:
      - '_posts/*ai-daily*.md'

permissions:
  contents: read

concurrency:
  group: "wechat-publish-${{ inputs.post || github.event.client_payload.post || github.sha }}"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need at least 2 commits so we can diff event.before..event.after
          # on push events to find newly added AI Daily files.
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install client deps
        working-directory: tools
        run: npm install --no-audit --no-fund --omit=dev

      - name: Publish to WeChat (via Fly.io proxy)
        env:
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_API_PROXY: ${{ secrets.WECHAT_API_PROXY }}
          WECHAT_API_PROXY_SECRET: ${{ secrets.WECHAT_API_PROXY_SECRET }}
          # Fallback cover when the post has no image.path in front matter.
          DEFAULT_COVER: "assets/img/posts/harness-is-the-product/cover.png"
          # Unify dispatch inputs:
          POST_PATH:  ${{ inputs.post    || github.event.client_payload.post }}
          COVER_PATH: ${{ inputs.cover   || github.event.client_payload.cover }}
          PUBLISH:    ${{ inputs.publish || github.event.client_payload.publish }}
          DRY_RUN:    ${{ inputs.dry_run || github.event.client_payload.dry_run }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA:  ${{ github.event.after }}
        run: |
          set -e

          if [ "${{ github.event_name }}" = "push" ]; then
            # Auto-trigger: find newly added or modified AI Daily posts in this
            # push and create a draft for each. publish=false always — human
            # reviews in 公众号 后台 → 草稿箱 before sending.
            # Cover priority: COVER_PATH env > post front matter image.path > DEFAULT_COVER env.
            echo "::group::Find added/modified AI Daily posts in $BEFORE_SHA..$AFTER_SHA"
            ADDED=$(git diff --name-only --diff-filter=AM "$BEFORE_SHA" "$AFTER_SHA" -- '_posts/*ai-daily*.md' 2>/dev/null || true)
            if [ -z "$ADDED" ]; then
              echo "No added/modified AI Daily posts in this push — nothing to do."
              exit 0
            fi
            echo "Posts:"
            echo "$ADDED"
            echo "::endgroup::"

            for POST in $ADDED; do
              COVER_ARG=""
              if [ -n "$COVER_PATH" ]; then
                COVER_ARG="--cover $COVER_PATH"
              fi
              echo "::group::Publish $POST (cover=${COVER_PATH:-<from-frontmatter-or-default>}, publish=false)"
              node tools/wechat-publish.mjs --file "$POST" $COVER_ARG
              echo "::endgroup::"
            done
            exit 0
          fi

          # Manual dispatch path (workflow_dispatch | repository_dispatch).
          if [ -z "$POST_PATH" ]; then
            echo "::error::post path is required for manual dispatch"; exit 1
          fi
          ARGS="--file $POST_PATH"
          if [ -n "$COVER_PATH" ]; then
            ARGS="$ARGS --cover $COVER_PATH"
          fi
          if [ "$PUBLISH" = "true" ]; then
            ARGS="$ARGS --publish"
          fi
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node tools/wechat-publish.mjs $ARGS
