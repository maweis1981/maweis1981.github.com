name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Verify build output
        run: |
          echo "=== _site root entries ==="
          ls -la "_site${{ steps.pages.outputs.base_path }}" | head -25
          echo
          echo "=== _site/index.html stats ==="
          wc -c "_site${{ steps.pages.outputs.base_path }}/index.html"
          echo "=== first 200 bytes of _site/index.html ==="
          head -c 200 "_site${{ steps.pages.outputs.base_path }}/index.html"
          echo
          echo
          echo "=== sample post page exists? ==="
          ls -la "_site${{ steps.pages.outputs.base_path }}/posts/ai-daily-2026-06-07/" 2>&1 | head -3

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
