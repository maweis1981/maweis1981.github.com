<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hollow Lullaby — 小游戏合集</title>
<style>
  body { margin:0; min-height:100vh; background:linear-gradient(#080b1a,#180d2c); color:#eef;
         font:16px/1.7 system-ui,sans-serif; display:grid; place-items:center; }
  main { padding:32px 20px; max-width:520px; }
  h1 { letter-spacing:2px; } p { opacity:.75 }
  ul { list-style:none; padding:0; display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  a { display:block; padding:14px 10px; text-align:center; border-radius:10px; color:#fff;
      text-decoration:none; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); }
  a:hover { background:rgba(140,215,255,.2); }
  a.all { grid-column:1/-1; background:linear-gradient(90deg,#b33,#26a); font-weight:700; }
</style>
</head>
<body>
<main>
  <h1>HOLLOW LULLABY</h1>
  <p>Rust + Bevy + Lua 的小游戏合集（WebAssembly）。每个链接是同一份引擎 wasm 的单游戏直链。</p>
  <ul>
    <li><a class="all" href="./">完整合集（带菜单）</a></li>
    <li><a href="./?game=timedodge">Time Dodge（3D 陨石）</a></li>
    <li><a href="./?game=grow">Grow Paddle</a></li>
    <li><a href="./?game=breakout">Breakout</a></li>
    <li><a href="./?game=snake">Snake</a></li>
    <li><a href="./?game=roguelike">Rogue</a></li>
    <li><a href="./?game=game2048">2048</a></li>
    <li><a href="./?game=shooter">Shooter</a></li>
    <li><a href="./?game=world">Cozy Isle</a></li>
    <li><a href="./?game=craft">Craft</a></li>
    <li><a href="./?game=match3">Gem Match</a></li>
    <li><a href="./?game=umami">Umami Cup</a></li>
    <li><a href="./?game=catch">Fruit Catch</a></li>
    <li><a href="./?game=ponies">Ponies</a></li>
    <li><a href="./?game=gallery">Mystery</a></li>
    <li><a href="./?game=showcase">Engine Showcase</a></li>
  </ul>
</main>
</body>
</html>
